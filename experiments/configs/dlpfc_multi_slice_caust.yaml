# experiments/configs/dlpfc_multi_slice_caust.yaml
# -----------------------------------------------------------
# Config for: all 12 DLPFC slices, multi-slice CauST mode
# Run with: python scripts/04_run_multi_slice.py
# -----------------------------------------------------------

dataset:
  name: DLPFC
  processed_dir: data/processed/DLPFC/
  ground_truth_key: layer_guess
  n_clusters: 7
  slices: # all 12 slices; comment out any to skip
    - "151507"
    - "151508"
    - "151509"
    - "151510"
    - "151669"
    - "151670"
    - "151671"
    - "151672"
    - "151673"
    - "151674"
    - "151675"
    - "151676"

  donor_map:
    "151507": Donor1
    "151508": Donor1
    "151509": Donor1
    "151510": Donor1
    "151669": Donor2
    "151670": Donor2
    "151671": Donor2
    "151672": Donor2
    "151673": Donor3
    "151674": Donor3
    "151675": Donor3
    "151676": Donor3

preprocessing:
  n_top_genes: 3000
  min_cells: 5
  min_genes: 200

model:
  hidden_dim: 512
  latent_dim: 30
  epochs: 500
  lr: 0.001

causal:
  scoring_method: perturbation
  intervention: mean_impute
  n_causal_genes: 500
  alpha: 0.5 # weight: 0.5 * causal + 0.5 * invariance

filter:
  mode: filter_and_reweight
  k: 500

lodo:
  enabled: true # Leave-One-Donor-Out cross-validation

evaluation:
  metrics: [ari, nmi, silhouette, cross_slice_ari]
  save_csv: true

output:
  results_dir: experiments/results/multi_slice/
  figures_dir: experiments/results/figures/
